name: 'microkit/Hardware Builds'
description: |
  Does microkit hw builds.
author: Julia Vassiliki <julia.vassiliki@unsw.edu.au>

inputs:
  platform:
    description: Comma separated list of hardware platforms to run the test for.
    required: true
  index:
    description: job index in matrix build
    required: true
  action_name:
    description: 'internal -- do not use'
    required: false
    default: 'microkit-hw-build'

runs:
  using: 'node24'
  main: '../js/index.js'
